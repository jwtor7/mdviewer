name: repo-hygiene

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Scan for PII / credentials
        run: bash scripts/check-no-pii.sh

      - name: Test
        run: npm test
